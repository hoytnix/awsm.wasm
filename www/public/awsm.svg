<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="50%" stop-color="#302B63"/>
      <stop offset="100%" stop-color="#24243E"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="100%" stop-color="#7928CA"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66FCF1"/>
      <stop offset="100%" stop-color="#45A29E"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="80" fill="url(#bg)" />
  
  <g transform="translate(200, 200)">
    <!-- Outer Hexagon representing WASM -->
    <path d="M 0 -120 L 103.92 -60 L 103.92 60 L 0 120 L -103.92 60 L -103.92 -60 Z" 
          fill="none" stroke="url(#glow2)" stroke-width="8" filter="url(#neon)" opacity="0.8">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </path>
    
    <!-- Inner complex lines (AST/Alchemy nodes) -->
    <path d="M 0 -80 L 69.28 -40 L 0 40 L -69.28 -40 Z" fill="none" stroke="url(#glow)" stroke-width="6" filter="url(#neon)"/>
    <path d="M 0 80 L 69.28 40 L 0 -40 L -69.28 40 Z" fill="none" stroke="url(#glow)" stroke-width="6" filter="url(#neon)"/>
    
    <!-- Connecting points -->
    <circle cx="0" cy="-80" r="10" fill="#FFF" filter="url(#neon)"/>
    <circle cx="0" cy="80" r="10" fill="#FFF" filter="url(#neon)"/>
    <circle cx="69.28" cy="-40" r="10" fill="#FFF" filter="url(#neon)"/>
    <circle cx="-69.28" cy="-40" r="10" fill="#FFF" filter="url(#neon)"/>
    <circle cx="69.28" cy="40" r="10" fill="#FFF" filter="url(#neon)"/>
    <circle cx="-69.28" cy="40" r="10" fill="#FFF" filter="url(#neon)"/>
    
    <!-- Center Core -->
    <circle cx="0" cy="0" r="15" fill="#66FCF1" filter="url(#neon)">
      <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Code Brackets <> -->
    <text x="-40" y="15" font-family="monospace" font-size="40" font-weight="bold" fill="#FFF" text-anchor="middle" filter="url(#neon)">&lt;</text>
    <text x="40" y="15" font-family="monospace" font-size="40" font-weight="bold" fill="#FFF" text-anchor="middle" filter="url(#neon)">&gt;</text>
  </g>
</svg>
